<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece: Grand Sea Battle</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p1: #e74c3c; --p2: #3498db; --neon: #f1c40f; --win-green: #2ecc71; }
        * { font-family: 'Fredoka', sans-serif; box-sizing: border-box; font-variant: small-caps; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #bg-layer { position: fixed; inset: 0; background-image: url('title_bg.jpg'); background-size: cover; background-position: center; z-index: 1; }
        
        .screen { position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); }
        #select-screen, #editor-screen, #game-container, #victory-screen { display: none; }

        .white-box { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 40px; border: 10px solid var(--neon); display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        /* Editor Styles */
        .editor-container { width: 95%; max-height: 60vh; overflow-y: auto; background: white; padding: 15px; border-radius: 20px; }
        .edit-item { display: flex; align-items: center; gap: 15px; background: #f9f9f9; padding: 10px; border-radius: 15px; margin-bottom: 10px; border: 2px solid #ddd; }
        .edit-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; border: 2px solid var(--neon); cursor: pointer; }
        .edit-item input { flex: 1; padding: 8px; font-size: 1.1rem; border: 2px solid #ccc; border-radius: 10px; }
        .editor-btn { background: #34495e; color: white; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; }

        /* Arena */
        .arena-layout { display: flex; flex-direction: row; width: 95vw; height: 85vh; gap: 20px; }
        .player-side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 10px; }
        .sprite-img { height: 260px; width: auto; filter: drop-shadow(0 0 25px rgba(0,0,0,0.2)); transition: filter 0.2s; }
        .hp-bar { width: 90%; height: 30px; background: #333; border: 3px solid #000; border-radius: 15px; overflow: hidden; }
        .hp-fill { width: 100%; height: 100%; background: var(--win-green); transition: 0.4s; }
        
        .quiz-card { background: #f0f0f0; padding: 15px; border-radius: 25px; width: 100%; border: 4px solid #ccc; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* Choice Buttons */
        .btn-opt { padding: 5px; border-radius: 20px; border: 6px solid #fff; cursor: pointer; background: #fff; transition: border-color 0.2s; }
        .btn-opt img { width: 100%; height: 120px; object-fit: contain; border-radius: 10px; }
        .btn-correct { border-color: var(--win-green) !important; }

        .main-btn { padding: 15px 40px; font-size: 1.8rem; border-radius: 50px; background: var(--neon); color: #000; cursor: pointer; font-weight: bold; border: none; margin: 10px; }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div id="title-screen" class="screen">
        <h1 style="font-size: 5rem; color: var(--neon); text-shadow: 6px 6px 0 #000;">GRAND LINE</h1>
        <button class="main-btn" onclick="goToSelection(false)">1 PLAYER (CPU)</button>
        <button class="main-btn" onclick="goToSelection(true)" style="background: #3498db;">2 PLAYERS</button>
        <button class="main-btn" style="background: #95a5a6; font-size: 1.1rem;" onclick="showEditor()">EDITOR & QR CODE</button>
    </div>

    <div id="editor-screen" class="screen">
        <div class="white-box" style="width: 85%;">
            <h2>WORD EDITOR</h2>
            <div id="qr-area" style="display:none; background:white; padding:10px; margin-bottom:10px; border:4px solid var(--neon);"></div>
            <button class="editor-btn" onclick="toggleQR()" style="background:#e67e22; margin-bottom:10px;">TOGGLE QR CODE</button>
            <div class="editor-container" id="editor-list"></div>
            <div style="margin-top:15px;">
                <button class="editor-btn" onclick="addWord()" style="background:#3498db;">+ ADD NEW WORD</button>
                <button class="editor-btn" onclick="closeEditor()" style="background:var(--win-green);">SAVE & EXIT</button>
            </div>
        </div>
    </div>

    <div id="select-screen" class="screen">
        <h2 style="color:gold; font-size: 3rem;">SELECT CHARACTER</h2>
        <div id="diff-selector" style="margin-bottom:20px;">
            <button class="main-btn" id="btn-easy" style="font-size:1rem; padding:10px 20px;" onclick="setDiff('easy')">EASY</button>
            <button class="main-btn" id="btn-hard" style="font-size:1rem; padding:10px 20px; background:#bdc3c7;" onclick="setDiff('hard')">HARD</button>
        </div>
        <div style="display:flex; gap:30px;">
            <div class="p-area">
                <h3 style="color:var(--p1)">PLAYER 1</h3>
                <div id="grid1" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;"></div>
            </div>
            <div class="p-area">
                <h3 id="p2-label" style="color:var(--p2)">PLAYER 2</h3>
                <div id="grid2" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;"></div>
            </div>
        </div>
        <button class="main-btn" id="fight-btn" style="display:none; background:#e74c3c; margin-top:20px;" onclick="startGame()">FIGHT!</button>
    </div>

    <div id="game-container" class="screen">
        <div class="white-box arena-layout">
            <div class="player-side">
                <img src="" id="p1-img" class="sprite-img">
                <div class="hp-bar"><div id="p1-hp" class="hp-fill"></div></div>
                <div class="quiz-card"><div class="options-grid" id="p1-opts"></div></div>
            </div>
            <div class="player-side">
                <img src="" id="p2-img" class="sprite-img">
                <div class="hp-bar"><div id="p2-hp" class="hp-fill"></div></div>
                <div class="quiz-card"><div class="options-grid" id="p2-opts"></div></div>
            </div>
        </div>
    </div>

    <div id="victory-screen" class="screen">
        <div class="white-box">
            <h1 id="victory-text" style="font-size: 3rem;"></h1>
            <img id="winner-gif" src="" style="height:300px; border-radius:20px; border:8px solid var(--win-green);">
            <button class="main-btn" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const characters = ["luffy.gif", "zoro.gif", "sanji.gif", "nami.gif", "chopper.gif"];
        let p1Char, p2Char, h1=100, h2=100, isTwoPlayer=false, difficulty='easy', cpuInterval;
        let questionBank = JSON.parse(localStorage.getItem('seaBattleCache')) || [
            {word: "quilt", img: "quilt.jpg"}, {word: "queen", img: "queen.jpg"},
            {word: "rabbit", img: "rabbit.jpg"}, {word: "robot", img: "robot.jpg"},
            {word: "snake", img: "snake.jpg"}, {word: "sun", img: "sun.jpg"}
        ];

        function speak(txt) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(txt); u.lang='en-US'; window.speechSynthesis.speak(u); }

        function showEditor() { document.getElementById('title-screen').style.display='none'; document.getElementById('editor-screen').style.display='flex'; renderEditor(); }
        function renderEditor() {
            const list = document.getElementById('editor-list'); list.innerHTML = '';
            questionBank.forEach((item, i) => {
                const div = document.createElement('div'); div.className = 'edit-item';
                div.innerHTML = `<img src="${item.img}" onclick="speak('${item.word}')"><input type="text" value="${item.word}" onchange="questionBank[${i}].word=this.value.toLowerCase();save()"><button class="editor-btn" onclick="const url=prompt('Img URL:');if(url){questionBank[${i}].img=url;renderEditor();save()}">IMG</button><button class="editor-btn" style="background:red;" onclick="questionBank.splice(${i},1);renderEditor();save()">DEL</button>`;
                list.appendChild(div);
            });
        }
        function addWord() { questionBank.push({word: "new", img: "placeholder.jpg"}); renderEditor(); save(); }
        function save() { localStorage.setItem('seaBattleCache', JSON.stringify(questionBank)); }
        function closeEditor() { document.getElementById('editor-screen').style.display='none'; document.getElementById('title-screen').style.display='flex'; }
        function toggleQR() { const a = document.getElementById('qr-area'); a.style.display = a.style.display==='none'?'block':'none'; if(a.innerHTML==="") new QRCode(a, {text: window.location.href, width: 150, height: 150}); }

        function setDiff(d) { difficulty = d; document.getElementById('btn-easy').style.background = d==='easy'?'var(--neon)':'#bdc3c7'; document.getElementById('btn-hard').style.background = d==='hard'?'var(--neon)':'#bdc3c7'; }

        function goToSelection(tp) {
            isTwoPlayer = tp;
            document.getElementById('title-screen').style.display='none';
            document.getElementById('select-screen').style.display='flex';
            document.getElementById('grid1').innerHTML = characters.map(c => `<img src="${c}" style="width:85px; border:4px solid #fff; cursor:pointer;" onclick="setChar(1,'${c}',this)">`).join('');
            
            if(!tp) {
                p2Char = characters[Math.floor(Math.random()*characters.length)];
                document.getElementById('grid2').style.display = 'none';
                document.getElementById('p2-label').innerText = "COMPUTER READY";
            } else {
                document.getElementById('grid2').style.display = 'grid';
                document.getElementById('p2-label').innerText = "PLAYER 2";
                document.getElementById('grid2').innerHTML = characters.map(c => `<img src="${c}" style="width:85px; border:4px solid #fff; cursor:pointer;" onclick="setChar(2,'${c}',this)">`).join('');
            }
        }

        function setChar(p, c, el) {
            if(p===1) p1Char = c; else p2Char = c;
            Array.from(el.parentElement.children).forEach(i => i.style.borderColor='#fff');
            el.style.borderColor = 'var(--win-green)';
            if(p1Char && p2Char) document.getElementById('fight-btn').style.display='block';
        }

        function startGame() {
            document.getElementById('select-screen').style.display='none';
            document.getElementById('game-container').style.display='flex';
            document.getElementById('p1-img').src = p1Char;
            document.getElementById('p2-img').src = p2Char;
            nextRound();
            if(!isTwoPlayer) {
                cpuInterval = setInterval(() => {
                    if(Math.random() > (difficulty==='easy'?0.75:0.35)) {
                        const btns = document.querySelectorAll('#p2-opts .btn-opt');
                        btns.forEach(b => { if(b.getAttribute('data-word') === currentWord) b.classList.add('btn-correct'); });
                        setTimeout(() => { attack(1); nextRound(); }, 600);
                    }
                }, 6000);
            }
        }

        let currentWord = "";
        function nextRound() {
            const target = questionBank[Math.floor(Math.random() * questionBank.length)];
            currentWord = target.word;
            speak(target.word);
            let opts = [target, ...questionBank.filter(q => q !== target).sort(() => 0.5-Math.random()).slice(0,3)].sort(() => 0.5-Math.random());
            
            [1, 2].forEach(p => {
                const b = document.getElementById(`p${p}-opts`);
                b.innerHTML = opts.map(o => `<button class="btn-opt" data-word="${o.word}" onclick="handlePress(${p},this,'${o.word}','${target.word}')"><img src="${o.img}"></button>`).join('');
            });
        }

        function handlePress(p, el, choice, correct) {
            if(choice === correct) {
                el.classList.add('btn-correct');
                setTimeout(() => { attack(p===1?2:1); nextRound(); }, 300);
            } else {
                nextRound();
            }
        }

        function attack(vic) {
            const s = document.getElementById(`p${vic}-img`);
            s.style.filter = "brightness(3) saturate(0)";
            if(vic===1) h1-=10; else h2-=10;
            document.getElementById(`p${vic}-hp`).style.width = (vic===1?h1:h2)+"%";
            setTimeout(() => s.style.filter="none", 250);
            if(h1<=0 || h2<=0) {
                clearInterval(cpuInterval);
                document.getElementById('game-container').style.display='none';
                document.getElementById('victory-screen').style.display='flex';
                document.getElementById('victory-text').innerText = (h1<=0? (isTwoPlayer?"PLAYER 2":"COMPUTER") : "PLAYER 1") + " WINS!";
                document.getElementById('winner-gif').src = h1<=0 ? p2Char : p1Char;
            }
        }
    </script>
</body>
</html>
